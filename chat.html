<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat with Yousif's AI</title>
    <meta name="description" content="Chat with Yousif Al-Nasser's AI assistant via voice or text." />
    <meta name="theme-color" content="#0a0a0f" />
    <link rel="shortcut icon" type="image/png" href="Assets/img/ai.png" />
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css" />
    <link rel="stylesheet" href="css/chat.css" />
</head>
<body>
    <div class="chat-bg"></div>

    <div class="chat-page">
        <!-- Header -->
        <header class="chat-header">
            <div class="chat-header__left">
                <a href="index.html" class="chat-header__back">
                    <i class="uil uil-arrow-left"></i>
                    <span>Portfolio</span>
                </a>
                <div class="chat-header__title">Yousif's AI — Chat</div>
            </div>
            <div style="display:flex;align-items:center;gap:1rem;">
                <div class="chat-header__status">
                    <span class="chat-status-dot" id="chat-status-dot"></span>
                    <span id="chat-status-text">Offline</span>
                </div>
                <button class="chat-connect-btn" id="chat-connect-btn">
                    <i class="uil uil-link"></i> Connect
                </button>
            </div>
        </header>

        <!-- Messages -->
        <div class="chat-messages" id="chat-messages">
            <div class="chat-empty" id="chat-empty">
                <div class="chat-empty__icon"><i class="uil uil-robot"></i></div>
                <div class="chat-empty__title">Hi, I'm Yousif's AI</div>
                <div class="chat-empty__sub">Connect and ask me anything — about Yousif's experience, projects, skills, or just have a conversation. Voice and text supported.</div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <div class="chat-input-bar">
                <textarea
                    class="chat-input-text"
                    id="chat-input"
                    placeholder="Ask me anything..."
                    rows="1"
                    disabled
                ></textarea>
                <div class="chat-input-actions">
                    <button class="chat-btn chat-btn--record" id="chat-record-btn" title="Record voice message" disabled>
                        <i class="uil uil-microphone"></i>
                    </button>
                    <button class="chat-btn chat-btn--send" id="chat-send-btn" title="Send message" disabled>
                        <i class="uil uil-message"></i>
                    </button>
                </div>
            </div>
            <div class="chat-input-hint" id="chat-hint">Connect to start chatting</div>
        </div>
    </div>

    <script src="js/chat.js"></script>
</body>
</html>
